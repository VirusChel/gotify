<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GoTify — музыка сообщество (сохранение)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #0a1f1a;
            --bg-gradient-end: #07120e;
            --card-bg: #111b18;
            --card-hover: #1c2d27;
            --accent: #1db954;
            --accent-glow: #1ed760;
            --text-primary: #f0f3f2;
            --text-secondary: #b0c4bc;
            --sidebar-bg: rgba(6, 18, 14, 0.95);
            --border-light: rgba(29, 185, 84, 0.25);
            --shadow: 0 12px 28px rgba(0,0,0,0.5);
            --search-bg: rgba(0, 0, 0, 0.3);
        }

        body.theme-snow {
            --bg-gradient-start: #e8ecf2;
            --bg-gradient-end: #d0d9e6;
            --card-bg: #ffffffcc;
            --card-hover: #f5f7facc;
            --accent: #2c7da0;
            --accent-glow: #2c7da0;
            --text-primary: #1e2a36;
            --text-secondary: #2c3e50;
            --sidebar-bg: rgba(255,255,255,0.95);
            --border-light: #2c7da080;
            --search-bg: rgba(0, 0, 0, 0.2);
        }
        body.theme-blood {
            --bg-gradient-start: #2b0b0f;
            --bg-gradient-end: #1a0609;
            --card-bg: #2a1519;
            --card-hover: #3e1e24;
            --accent: #e63946;
            --accent-glow: #ff5c6e;
            --text-primary: #fff0f2;
            --text-secondary: #e0b4bb;
            --sidebar-bg: rgba(40, 10, 14, 0.95);
            --border-light: #e6394680;
            --search-bg: rgba(0, 0, 0, 0.4);
        }
        body.theme-sun {
            --bg-gradient-start: #382008;
            --bg-gradient-end: #1f1204;
            --card-bg: #3f2a14;
            --card-hover: #5a3e1f;
            --accent: #f4a261;
            --accent-glow: #ffba7a;
            --text-primary: #fff2e0;
            --text-secondary: #f7d9b5;
            --sidebar-bg: rgba(45, 30, 12, 0.95);
            --border-light: #f4a26180;
            --search-bg: rgba(0, 0, 0, 0.4);
        }
        body.theme-night {
            --bg-gradient-start: #1e1a3a;
            --bg-gradient-end: #0f0c22;
            --card-bg: #23204a;
            --card-hover: #35316b;
            --accent: #c084fc;
            --accent-glow: #d8b4fe;
            --text-primary: #f0eaff;
            --text-secondary: #cdc4ff;
            --sidebar-bg: rgba(20, 16, 48, 0.95);
            --border-light: #c084fc80;
            --search-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.2s;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .main-row {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: var(--accent);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 24px;
            color: black;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        .mobile-menu-btn:hover {
            transform: scale(1.05);
        }

        .sidebar-mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 15;
            backdrop-filter: blur(4px);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: flex; }
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                width: 260px;
                border-radius: 0 20px 20px 0;
                z-index: 25;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-mobile-overlay.open { display: block; }
            .content { padding: 70px 16px 20px; }
            .tracks-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
            .player-bar { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
            .player-info { width: 140px; }
            .control-buttons { gap: 8px; }
            .ctrl-btn { font-size: 20px; }
            .play-pause { width: 40px; height: 40px; font-size: 18px; }
            .progress-area { order: 1; width: 100%; margin-top: 6px; }
            .volume-control { width: 100px; }
        }

        .logo {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(125deg, var(--accent), var(--accent-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 16px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            transform: translateX(5px);
        }

        .search-container {
            background: var(--search-bg);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }
        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(29,185,84,0.2);
        }
        .search-container input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            font-size: 15px;
        }
        .search-container input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .track-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s ease, border-color 0.2s ease;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
        }
        .track-card:hover {
            transform: translateY(-8px);
            background: var(--card-hover);
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }
        .track-cover {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .track-name {
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }
        .play-count {
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 30px;
        }
        .play-icon-badge {
            position: absolute;
            bottom: 18px;
            right: 18px;
            background: var(--accent);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            font-size: 16px;
            color: black;
        }
        .track-card:hover .play-icon-badge {
            opacity: 1;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 36px;
            margin: 40px auto;
            max-width: 500px;
        }
        .upload-helper {
            display: inline-block;
            background: var(--accent);
            color: black;
            padding: 12px 28px;
            border-radius: 60px;
            margin-top: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .upload-helper:hover {
            transform: scale(1.02);
            background: var(--accent-glow);
        }

        .player-bar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-light);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .player-info { width: 220px; overflow: hidden; }
        .track-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .control-buttons { display: flex; gap: 16px; align-items: center; }
        .ctrl-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            transition: transform 0.15s ease, color 0.15s ease;
        }
        .ctrl-btn:hover {
            color: var(--accent);
            transform: scale(1.08);
        }
        .play-pause {
            background: var(--accent);
            color: black;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .play-pause:hover {
            transform: scale(1.05);
            background: var(--accent-glow);
        }
        .progress-area { display: flex; align-items: center; gap: 12px; flex: 2; min-width: 150px; }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 10px; }
        .volume-control { width: 120px; display: flex; gap: 8px; align-items: center; }
        .volume-slider { width: 80px; cursor: pointer; }

        .about-container { max-width: 700px; margin: 0 auto; text-align: center; background: rgba(0,0,0,0.3); border-radius: 48px; padding: 48px 32px; }
        .social-links { display: flex; justify-content: center; gap: 28px; margin: 32px 0 20px; flex-wrap: wrap; }
        .social-btn {
            background: var(--card-bg);
            padding: 12px 24px;
            border-radius: 60px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .social-btn:hover {
            background: var(--accent);
            color: black;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="theme-emerald">
<div class="app">
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    <div class="sidebar-mobile-overlay" id="sidebarOverlay"></div>
    <div class="main-row">
        <div class="sidebar" id="sidebar">
            <div class="logo">🎧 GoTify</div>
            <div>
                <button class="nav-item active" data-nav="home">🏠 Главная</button>
                <button class="nav-item" data-nav="search">🔍 Поиск (топ)</button>
                <button class="nav-item" data-nav="library">📚 Моя библиотека</button>
                <button class="nav-item" data-nav="themes">🎨 Темы</button>
                <button class="nav-item" data-nav="about">ℹ️ About</button>
                <div style="margin: 20px 0 8px;">
                    <input type="file" id="uploadInput" multiple accept="audio/*" style="display: none;">
                    <button id="uploadBtn" class="nav-item" style="background: var(--accent)20; justify-content: center;">➕ Загрузить трек</button>
                </div>
            </div>
        </div>
        <div class="content" id="contentArea">
            <div id="dynamicContent">Загрузка...</div>
        </div>
    </div>
    <div class="player-bar">
        <div class="player-info">
            <div class="track-title" id="currentTrackName">🎧 нет трека</div>
            <div style="font-size: 11px;" id="currentPlaylistName"></div>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn" id="prevBtn">⏮</button>
            <button class="ctrl-btn play-pause" id="playPauseBtn">▶</button>
            <button class="ctrl-btn" id="nextBtn">⏭</button>
        </div>
        <div class="progress-area">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" class="volume-slider">
        </div>
    </div>
</div>

<script>
    // ---------- IndexedDB ----------
    const DB_NAME = 'GoTifyDB';
    const DB_VERSION = 2; // увеличил версию для обновления структуры
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('tracks')) {
                    const store = db.createObjectStore('tracks', { keyPath: 'id' });
                    store.createIndex('by_date', 'date');
                    store.createIndex('by_plays', 'plays');
                }
                if (!db.objectStoreNames.contains('playlists')) {
                    db.createObjectStore('playlists', { keyPath: 'id' });
                }
            };
        });
    }

    async function addTrackToDB(track) {
        const transaction = db.transaction(['tracks'], 'readwrite');
        const store = transaction.objectStore('tracks');
        await store.add(track);
        return new Promise(resolve => { transaction.oncomplete = resolve; });
    }

    async function getAllTracks() {
        const transaction = db.transaction(['tracks'], 'readonly');
        const store = transaction.objectStore('tracks');
        const request = store.getAll();
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function incrementPlaysDB(trackId) {
        const track = await getTrackById(trackId);
        if (track) {
            track.plays = (track.plays || 0) + 1;
            const transaction = db.transaction(['tracks'], 'readwrite');
            const store = transaction.objectStore('tracks');
            await store.put(track);
            return new Promise(resolve => { transaction.oncomplete = resolve; });
        }
    }

    async function getTrackById(id) {
        const transaction = db.transaction(['tracks'], 'readonly');
        const store = transaction.objectStore('tracks');
        const request = store.get(id);
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function getPlaylists() {
        const transaction = db.transaction(['playlists'], 'readonly');
        const store = transaction.objectStore('playlists');
        const request = store.getAll();
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    async function savePlaylists(playlists) {
        const transaction = db.transaction(['playlists'], 'readwrite');
        const store = transaction.objectStore('playlists');
        store.clear();
        for (const pl of playlists) store.add(pl);
        return new Promise(resolve => { transaction.oncomplete = resolve; });
    }

    // --- Глобальные переменные ---
    let globalTracks = [];
    let myLibrary = [];
    let playlists = [];
    let audio = new Audio();
    let currentTrackId = null;
    let isPlaying = false;
    let isLoading = true; // флаг загрузки

    // Инициализация: открываем БД, загружаем треки, рендерим
    async function initDBAndRender() {
        try {
            await openDB();
            globalTracks = await getAllTracks();
            myLibrary = [...globalTracks];
            const storedPlaylists = await getPlaylists();
            if (storedPlaylists.length === 0) {
                playlists = [{ id: 'default_all', name: '📀 Все треки', trackIds: globalTracks.map(t => t.id) }];
                await savePlaylists(playlists);
            } else {
                playlists = storedPlaylists;
            }
            isLoading = false;
            renderCurrentView(); // рендерим после загрузки
        } catch (e) {
            console.error('Ошибка загрузки БД', e);
            document.getElementById('dynamicContent').innerHTML = '<div class="empty-state">Ошибка загрузки данных. Попробуйте перезагрузить страницу.</div>';
        }
    }

    async function uploadTrack(file, customArtist = null) {
        if (isLoading) return;
        const fileName = file.name.replace(/\.[^/.]+$/, '');
        const artist = customArtist || prompt("Исполнитель:", "Неизвестный") || "Неизвестный";
        const id = Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        const fileData = file;
        const track = { id, name: fileName, artist, plays: 0, fileData, date: Date.now() };
        await addTrackToDB(track);
        // Обновляем кэш
        globalTracks = await getAllTracks();
        myLibrary = [...globalTracks];
        const allPlaylist = playlists.find(p => p.id === 'default_all');
        if (allPlaylist) {
            allPlaylist.trackIds.push(id);
            await savePlaylists(playlists);
        }
        renderCurrentView();
    }

    async function playTrack(trackId) {
        const track = globalTracks.find(t => t.id === trackId);
        if (!track || !track.fileData) { alert("Трек недоступен"); return; }
        const url = URL.createObjectURL(track.fileData);
        if (currentTrackId === trackId && audio.src === url) {
            audio.play();
            isPlaying = true;
            document.getElementById('playPauseBtn').innerHTML = '⏸';
            return;
        }
        audio.src = url;
        audio.load();
        audio.play().catch(e => console.warn);
        isPlaying = true;
        document.getElementById('playPauseBtn').innerHTML = '⏸';
        document.getElementById('currentTrackName').innerText = `${track.name} · ${track.artist}`;
        document.getElementById('currentPlaylistName').innerText = 'сообщество';
        currentTrackId = trackId;
        await incrementPlaysDB(trackId);
        // Обновляем счетчики в списке
        globalTracks = await getAllTracks();
        myLibrary = [...globalTracks];
        renderCurrentView();
    }

    function renderHome() {
        const sorted = [...globalTracks].sort((a,b) => (b.plays||0) - (a.plays||0));
        const container = document.getElementById('dynamicContent');
        if (!sorted.length) {
            container.innerHTML = `
                <div class="empty-state">
                    🎶 Сообщество пусто. Загрузи первый трек!
                    <div class="upload-helper" id="emptyUploadBtn">📤 Загрузить песню</div>
                </div>`;
            document.getElementById('emptyUploadBtn')?.addEventListener('click', () => document.getElementById('uploadInput').click());
            return;
        }
        container.innerHTML = `<div class="greeting">🔥 Что слушают другие</div><div class="tracks-grid">${sorted.map(t => `
            <div class="track-card" data-id="${t.id}" data-type="global">
                <div class="track-cover">🎵</div>
                <div class="track-name">${escapeHtml(t.name)}</div>
                <div class="track-artist">${escapeHtml(t.artist)} <span class="play-count">▶️ ${t.plays || 0}</span></div>
                <div class="play-icon-badge">▶</div>
            </div>
        `).join('')}</div>`;
        attachGlobalEvents();
    }

    function attachGlobalEvents() {
        document.querySelectorAll('.track-card[data-type="global"]').forEach(card => {
            card.addEventListener('click', () => playTrack(card.dataset.id));
        });
    }

    function renderSearch() {
        const topTracks = [...globalTracks].sort((a,b)=> (b.plays||0)-(a.plays||0)).slice(0,12);
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="search-container">
                <span>🔎</span>
                <input type="text" id="searchInputGlobal" placeholder="Найти трек или исполнителя...">
            </div>
            <div class="section-title" style="font-size:24px; margin:16px 0;">🏆 Самые популярные</div>
            <div id="searchResultsArea" class="tracks-grid">${topTracks.map(t => `
                <div class="track-card" data-id="${t.id}" data-type="global">
                    <div class="track-cover">🎧</div>
                    <div class="track-name">${escapeHtml(t.name)}</div>
                    <div class="track-artist">${escapeHtml(t.artist)} ⚡ ${t.plays || 0}</div>
                    <div class="play-icon-badge">▶</div>
                </div>
            `).join('')}</div>
        `;
        attachGlobalEvents();
        const searchInput = document.getElementById('searchInputGlobal');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = globalTracks.filter(t => t.name.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
            const resultsDiv = document.getElementById('searchResultsArea');
            if (!filtered.length) {
                resultsDiv.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">😔 Не удалось найти «${escapeHtml(query)}».<br><div class="upload-helper" id="searchUploadBtn">📀 Загрузить</div></div>`;
                document.getElementById('searchUploadBtn')?.addEventListener('click', () => document.getElementById('uploadInput').click());
            } else {
                resultsDiv.innerHTML = filtered.map(t => `<div class="track-card" data-id="${t.id}" data-type="global">
                    <div class="track-cover">🔊</div>
                    <div class="track-name">${escapeHtml(t.name)}</div>
                    <div class="track-artist">${escapeHtml(t.artist)} · 🎧 ${t.plays}</div>
                    <div class="play-icon-badge">▶</div>
                </div>`).join('');
                attachGlobalEvents();
            }
        });
    }

    function renderLibrary() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `<div class="greeting">📀 Моя библиотека</div>
            <div class="tracks-grid">${myLibrary.map(t => `
                <div class="track-card" data-id="${t.id}" data-type="local">
                    <div class="track-cover">💿</div>
                    <div class="track-name">${escapeHtml(t.name)}</div>
                    <div class="track-artist">${escapeHtml(t.artist)}</div>
                    <div class="play-icon-badge">▶</div>
                </div>
            `).join('')}</div>
            <button id="createPlaylistBtnLib" style="background:var(--accent); margin-top:24px; padding:10px 20px; border-radius:40px; border:none; font-weight:bold; cursor:pointer; transition:transform 0.2s ease;">➕ Новый плейлист</button>
        `;
        document.querySelectorAll('.track-card[data-type="local"]').forEach(card => {
            card.addEventListener('click', () => playTrack(card.dataset.id));
        });
        const btn = document.getElementById('createPlaylistBtnLib');
        if (btn) {
            btn.addEventListener('click', async () => {
                const name = prompt("Название плейлиста");
                if (name) {
                    playlists.push({ id: Date.now() + '', name: name, trackIds: [] });
                    await savePlaylists(playlists);
                    renderLibrary();
                }
            });
        }
    }

    function renderThemes() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `<div class="greeting">🎨 Выбери тему</div><div class="tracks-grid" style="grid-template-columns: repeat(auto-fill, minmax(140px,1fr));">
            <div class="track-card" data-theme="emerald"><div class="track-cover">🌿</div><div class="track-name">Изумруд</div></div>
            <div class="track-card" data-theme="snow"><div class="track-cover">❄️</div><div class="track-name">Снег</div></div>
            <div class="track-card" data-theme="blood"><div class="track-cover">🩸</div><div class="track-name">Кровь</div></div>
            <div class="track-card" data-theme="sun"><div class="track-cover">☀️</div><div class="track-name">Солнце</div></div>
            <div class="track-card" data-theme="night"><div class="track-cover">🌙</div><div class="track-name">Фиол. ночь</div></div>
        </div>`;
        document.querySelectorAll('.track-card[data-theme]').forEach(card => {
            card.addEventListener('click', () => {
                const theme = card.dataset.theme;
                document.body.className = `theme-${theme}`;
                localStorage.setItem('gotify_theme', theme);
                renderThemes();
            });
        });
    }

    function renderAbout() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="about-container">
                <div class="about-icon">🎧✨</div>
                <h2 style="margin: 20px 0;">GoTify · Community Edition</h2>
                <p style="margin-bottom: 16px;">разработка 1 человек — <strong>Laxsy</strong></p>
                <div class="social-links">
                    <a href="https://discord.gg/nJQmJmuq7" target="_blank" class="social-btn">💬 Discord сервер</a>
                    <a href="https://www.donationalerts.com/r/XDstrogo" target="_blank" class="social-btn">❤️ Помочь сайту</a>
                </div>
                <p>Вопросы, идеи: <strong>@chesteryosha</strong> (Discord)</p>
                <p style="margin-top: 20px; font-size:13px;">Музыкальное сообщество, где каждый трек находит своих слушателей.</p>
            </div>
        `;
    }

    function renderCurrentView() {
        if (isLoading) {
            document.getElementById('dynamicContent').innerHTML = '<div class="empty-state">Загрузка...</div>';
            return;
        }
        const active = document.querySelector('.nav-item.active')?.dataset.nav || 'home';
        if (active === 'home') renderHome();
        else if (active === 'search') renderSearch();
        else if (active === 'library') renderLibrary();
        else if (active === 'themes') renderThemes();
        else if (active === 'about') renderAbout();
        else renderHome();
    }

    function playPause() {
        if (audio.paused) { audio.play(); isPlaying = true; document.getElementById('playPauseBtn').innerHTML = '⏸'; }
        else { audio.pause(); isPlaying = false; document.getElementById('playPauseBtn').innerHTML = '▶'; }
    }
    function nextTrack() {
        if (currentTrackId) {
            const idx = globalTracks.findIndex(t => t.id === currentTrackId);
            if (idx !== -1 && idx+1 < globalTracks.length) playTrack(globalTracks[idx+1].id);
            else if (globalTracks.length) playTrack(globalTracks[0].id);
        }
    }
    function prevTrack() {
        if (currentTrackId) {
            const idx = globalTracks.findIndex(t => t.id === currentTrackId);
            if (idx > 0) playTrack(globalTracks[idx-1].id);
            else if (globalTracks.length) playTrack(globalTracks[globalTracks.length-1].id);
        }
    }

    // --- Мобильное меню с правильной работой ---
    document.addEventListener('DOMContentLoaded', async () => {
        // загрузка темы
        const savedTheme = localStorage.getItem('gotify_theme') || 'emerald';
        document.body.className = `theme-${savedTheme}`;

        // инициализация БД и данных
        await initDBAndRender();

        // мобильное меню
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('mobileMenuBtn');
        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }
        function openMenu() {
            sidebar.classList.add('open');
            overlay.classList.add('open');
        }
        menuBtn.addEventListener('click', openMenu);
        overlay.addEventListener('click', closeMenu);
        // закрываем при клике на пункт меню
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.innerWidth <= 768) closeMenu();
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentView();
            });
        });

        // обработчики загрузки
        document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('uploadInput').click());
        document.getElementById('uploadInput').addEventListener('change', async (e) => {
            for (let file of e.target.files) await uploadTrack(file, null);
            e.target.value = '';
            renderCurrentView();
        });

        // плеер
        document.getElementById('playPauseBtn').onclick = playPause;
        document.getElementById('nextBtn').onclick = nextTrack;
        document.getElementById('prevBtn').onclick = prevTrack;
        const progressBar = document.getElementById('progressBar');
        progressBar.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                document.getElementById('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                document.getElementById('totalTime').innerText = formatTime(audio.duration);
            }
        });
        audio.addEventListener('ended', () => nextTrack());
        document.getElementById('volumeSlider').addEventListener('input', (e) => audio.volume = e.target.value);
        audio.volume = 0.7;
    });

    function formatTime(s) { if (isNaN(s)) return '0:00'; const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0'+sec:sec}`; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
